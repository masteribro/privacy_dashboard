{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Login</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('register') }}">Don't have an account? Register</a>
                    </div>
                    
                    <hr>
                    
                    <div class="text-center">
                        <p class="text-muted">Quick access:</p>
                        <a href="{{ url_for('quick_demo') }}" class="btn btn-outline-success">
                            <i class="fas fa-rocket"></i> Try Demo Account
                        </a>
                        <small class="d-block mt-2 text-muted">Demo account: username "demo", password "password123"</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
